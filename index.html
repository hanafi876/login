<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 GAME DUNIAWI 🌌</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bungee&display=swap');

    :root {
      --gold: #ffd700; --neon-blue: #00ff88; --crimson: #ff1493; --dark: #050505;
    }

    body {
      margin: 0; background: var(--dark); color: white;
      font-family: 'Orbitron', sans-serif; overflow-x: hidden;
    }

    .container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px; text-align: center;
    }

    .hidden { display: none !important; }

    /* LEADERBOARD STYLE */
    .leaderboard {
      background: rgba(255, 255, 255, 0.05); border: 2px solid var(--gold);
      padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; margin-bottom: 30px;
    }
    .leaderboard h3 { color: var(--gold); margin-top: 0; }
    .leaderboard-item {
      display: flex; justify-content: space-between; padding: 8px 0;
      border-bottom: 1px solid rgba(255,215,0,0.2);
    }

    /* BUTTONS */
    .btn {
      padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none;
      border-radius: 50px; font-family: 'Bungee'; transition: 0.3s; margin: 10px;
    }
    .btn-gold { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }
    .btn-blue { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }
    .btn:hover { transform: scale(1.1); }

    /* GAME UI */
    .rps-choices { display: flex; gap: 20px; margin: 30px 0; }
    .choice-card {
      padding: 20px; background: #111; border: 2px solid white;
      border-radius: 15px; cursor: pointer; font-size: 3rem; transition: 0.3s;
    }
    .choice-card:hover { border-color: var(--neon-blue); transform: translateY(-10px); }
    
    #gameResult { font-size: 1.5rem; font-weight: bold; margin-top: 20px; min-height: 2em; }
    
    /* INPUT BOX */
    input {
      padding: 15px; border-radius: 10px; border: none; width: 80%;
      max-width: 300px; margin-bottom: 20px; font-size: 1rem; text-align: center;
    }
  </style>
</head>
<body>

  <div id="loginPage" class="container">
    <h1 style="font-family: 'Bungee'; font-size: 3.5rem; color: var(--gold);">COSMIC<br>ARENA</h1>
    <button class="btn btn-gold" id="loginBtn">🚀 LOGIN WITH GOOGLE 🚀</button>
  </div>

  <div id="usernamePage" class="container hidden">
    <h2>SP KW?</h2>
    <input type="text" id="usernameInput" placeholder="Masukkan Username...">
    <button class="btn btn-blue" id="saveUsernameBtn">MULAI TAKDIRMU</button>
  </div>

  <div id="menuPage" class="container hidden">
    <h1 id="welcomeUser">HAI, WARRIOR!</h1>
    
    <div class="leaderboard">
      <h3>CALON CEO</h3>
      <div id="leaderboardList">Memuat para juara...</div>
    </div>

    <div style="font-size: 1.2rem; margin-bottom: 20px;">
      Poin Kamu: <span id="userScoreDisplay" style="color: var(--gold);">0</span>
    </div>

    <button class="btn btn-gold" id="startBtn">🔥 TANTANG SANG CEO 🔥</button>
  </div>

  <div id="gamePage" class="container hidden">
    <h2>BATU, KERTAS, GUNTING!</h2>
    <div class="rps-choices">
      <div class="choice-card" onclick="playGame('✊')">✊</div>
      <div class="choice-card" onclick="playGame('✋')">✋</div>
      <div class="choice-card" onclick="playGame('✌️')">✌️</div>
    </div>
    <div id="gameResult">Pilih senjatamu!</div>
    <button class="btn btn-blue" id="backToMenu">KEMBALI KE MENU</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAY6LV_wAqR3ggGpa8Ikmj_D3k8C6ya_pA",
      authDomain: "kokokokokokk-ee46b.firebaseapp.com",
      projectId: "kokokokokokk-ee46b",
      storageBucket: "kokokokokokk-ee46b.firebasestorage.app",
      messagingSenderId: "990174890024",
      appId: "1:990174890024:web:ab6abde9af8559e9318d1d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let userData = null;

    // --- SISTEM LOGIN ---
    document.getElementById('loginBtn').onclick = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        currentUser = result.user;
        checkUserInFirestore();
      } catch (e) { alert("Login Gagal!"); }
    };

    async function checkUserInFirestore() {
      const userRef = doc(db, "players", currentUser.uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        userData = userSnap.data();
        showMenu();
      } else {
        showUsernameEntry();
      }
    }

    // --- USERNAME SETUP ---
    function showUsernameEntry() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('usernamePage').classList.remove('hidden');
    }

    document.getElementById('saveUsernameBtn').onclick = async () => {
      const name = document.getElementById('usernameInput').value;
      if (name.length < 3) return alert("Nama terlalu pendek!");

      userData = { username: name, score: 0, uid: currentUser.uid };
      await setDoc(doc(db, "players", currentUser.uid), userData);
      showMenu();
    };

    // --- MENU & LEADERBOARD ---
    function showMenu() {
      document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
      document.getElementById('menuPage').classList.remove('hidden');
      document.getElementById('welcomeUser').textContent = `HALO, ${userData.username}!`;
      document.getElementById('userScoreDisplay').textContent = userData.score;
      loadLeaderboard();
    }

    function loadLeaderboard() {
      const q = query(collection(db, "players"), orderBy("score", "desc"), limit(5));
      onSnapshot(q, (snapshot) => {
        const list = document.getElementById('leaderboardList');
        list.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          list.innerHTML += `
            <div class="leaderboard-item">
              <span>${data.username}</span>
              <span style="color:var(--gold)">${data.score} Pts</span>
            </div>`;
        });
      });
    }

    // --- GAME LOGIC (BATU GUNTING KERTAS) ---
    const options = ['✊', '✋', '✌️'];
    
    document.getElementById('startBtn').onclick = () => {
      document.getElementById('menuPage').classList.add('hidden');
      document.getElementById('gamePage').classList.remove('hidden');
    };

    window.playGame = async (playerChoice) => {
      const pcChoice = options[Math.floor(Math.random() * 3)];
      const resDisplay = document.getElementById('gameResult');
      let pointsGained = 0;
      let status = "";

      if (playerChoice === pcChoice) {
        status = "SERI! 🤝";
        pointsGained = 0;
      } else if (
        (playerChoice === '✊' && pcChoice === '✌️') ||
        (playerChoice === '✋' && pcChoice === '✊') ||
        (playerChoice === '✌️' && pcChoice === '✋')
      ) {
        status = "KAMU MENANG! +5 🔥";
        pointsGained = 5;
      } else {
        status = "KAMU KALAH! -4 💀";
        pointsGained = -4;
      }

      userData.score += pointsGained;
      if (userData.score < 0) userData.score = 0; // Skor tidak minus

      resDisplay.innerHTML = `Kamu: ${playerChoice} vs PC: ${pcChoice}<br>${status}`;
      
      // Update ke Firebase
      await updateDoc(doc(db, "players", currentUser.uid), { score: userData.score });
      document.getElementById('userScoreDisplay').textContent = userData.score;
    };

    document.getElementById('backToMenu').onclick = showMenu;

  </script>
</body>
</html>
